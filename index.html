const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ═══ Constants (Study) ═══
const GS = "2026-03-23";
const RAMP = 140;
const B0 = 1, B1 = 50;
const INCR = (B1 - B0) / (RAMP - 1);
// 平日/休日の1日あたり増加率（休日は1.5倍）。目標変更時のランプにも使用。
const WEEKDAY_INCR = INCR;
const WEEKEND_INCR = INCR * 1.5;

// ═══ Constants (Meditation) ═══
const MED_START_DEFAULT = "2026-05-05";
const MED_COLOR = "#a78bfa";
const MED_SLOTS = ["朝","夜","その他"];
const MED_PRACTICES = ["数息観","隨息観","只管打坐"];

// ═══ Date utils (timezone-safe) ═══
function toStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function parseD(s) { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function today() { return toStr(new Date()); }
function diffD(a,b) { return Math.round((parseD(b)-parseD(a))/86400000); }
function addD(s,n) { const d=parseD(s); d.setDate(d.getDate()+n); return toStr(d); }
function isWe(s) { const w=parseD(s).getDay(); return w===0||w===6; }
function fF(s) { const d=parseD(s); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
function fS(s) { const d=parseD(s); return `${d.getMonth()+1}/${d.getDate()}`; }
function dw(s) { return ["日","月","火","水","木","金","土"][parseD(s).getDay()]; }
const gid=()=>Math.random().toString(36).slice(2,10);

// ═══ Schedule (Study) ═══
// 1日ノルマ(全分野合計)は「セグメント」の列で表される。
// 各セグメントは from(適用開始日)・weekday/weekend(平日/休日の目標=上限)・
// seedW/seedH(直近同種日の値と日付)を持つ。
// ある日 d のノルマ = min(上限, seed.val + 増加率 × (dとseed.dateの経過日数))。
// genesis セグメントは現行 dailyReq を完全再現する(平日上限50/休日75, seed=GSで1/1.5)。
const GENESIS_SEG = { from: GS, weekday: B1, weekend: B1 * 1.5, seedW: { date: GS, val: B0 }, seedH: { date: GS, val: B0 * 1.5 } };
function genesisStudySched() { return { past: [], current: [ JSON.parse(JSON.stringify(GENESIS_SEG)) ], future: [] }; }
function getSegs(state) {
  const c = state && state.studySchedule && Array.isArray(state.studySchedule.current) && state.studySchedule.current.length
    ? state.studySchedule.current : null;
  return c || [ GENESIS_SEG ];
}
function activeSeg(segs, date) {
  for (let i = segs.length - 1; i >= 0; i--) { if (segs[i].from <= date) return segs[i]; }
  return null;
}

// ═══ Core calc (Study) ═══
// dailyReq は segs(セグメント配列)を受け取る。省略時は genesis(現行挙動)。
function dailyReq(date, segs) {
  const n = diffD(GS, date) + 1; if (n <= 0) return 0;
  const s = segs || [ GENESIS_SEG ];
  const seg = activeSeg(s, date);
  if (!seg) return 0;
  if (isWe(date)) {
    return Math.min(seg.weekend, seg.seedH.val + WEEKEND_INCR * diffD(seg.seedH.date, date));
  }
  return Math.min(seg.weekday, seg.seedW.val + WEEKDAY_INCR * diffD(seg.seedW.date, date));
}
function fieldReq(f, date, segs) { if (!f.pct || date < f.startDate) return 0; return dailyReq(date, segs) * (f.pct / 100); }
function bookEff(b) { const tp=b.disabled?Math.min(b.pagesRead||0,b.totalPages):b.totalPages; return tp*(b.coeff||1); }
function fieldEff(f) { return f.books.reduce((s,b)=>s+bookEff(b),0); }
function fieldEnd(f, segs) {
  const tot=fieldEff(f); if(tot<=0||!f.pct) return null;
  let cum=0,d=f.startDate;
  for(let i=0;i<3650;i++){cum+=fieldReq(f,d,segs);if(cum>=tot)return d;d=addD(d,1);}
  return d;
}

// 目標変更を適用(今日から)。過去は seed として凍結。undo/redo 用に past/future 更新。
function applyStudyTarget(state, weekdayCap, weekendCap) {
  const sched = state.studySchedule && Array.isArray(state.studySchedule.current) && state.studySchedule.current.length
    ? state.studySchedule : genesisStudySched();
  const segs = sched.current;
  const C = today();
  let dw = addD(C, -1); while (isWe(dw)) dw = addD(dw, -1);
  let dh = addD(C, -1); while (!isWe(dh)) dh = addD(dh, -1);
  const vw = dailyReq(dw, segs);
  const vh = dailyReq(dh, segs);
  const newSeg = { from: C, weekday: weekdayCap, weekend: weekendCap, seedW: { date: dw, val: vw }, seedH: { date: dh, val: vh } };
  const last = segs[segs.length - 1];
  const newCurrent = (last && last.from === C) ? [ ...segs.slice(0, -1), newSeg ] : [ ...segs, newSeg ];
  return { ...state, studySchedule: { past: [ ...sched.past, segs ], current: newCurrent, future: [] } };
}
function studyUndo(state) {
  const s = state.studySchedule; if (!s || !s.past.length) return state;
  return { ...state, studySchedule: { past: s.past.slice(0, -1), current: s.past[s.past.length - 1], future: [ s.current, ...s.future ] } };
}
function studyRedo(state) {
  const s = state.studySchedule; if (!s || !s.future.length) return state;
  return { ...state, studySchedule: { past: [ ...s.past, s.current ], current: s.future[0], future: s.future.slice(1) } };
}
// 現在の目標上限(最新セグメント)
function curStudyCaps(segs) { const seg = segs[segs.length - 1]; return { weekday: seg.weekday, weekend: seg.weekend }; }
function logsEff(f,logs) {
  let t=0; Object.values(logs).forEach(arr=>{
    if(!Array.isArray(arr))return;
    arr.forEach(e=>{if(e.fid!==f.id)return;const b=f.books.find(x=>x.id===e.bid);if(b)t+=e.pg*(b.coeff||1);});
  }); return t;
}
// 分野完了判定: すべての本が「読了 or 無効」なら完了。
// 無効の本は残りを読まない方針なので、満たされたものとして扱う。
// 日数的に終わっていても、有効な本が未読了なら完了にはならない。
function fieldComplete(f) {
  if(!f||!Array.isArray(f.books)||f.books.length===0) return false;
  return f.books.every(b=>b.disabled||(b.pagesRead||0)>=b.totalPages);
}

// ═══ Date-aware allocation analysis (Study) ═══
function getAllocOnDate(fields, date, segs) {
  let total = 0;
  fields.forEach(f => {
    if (date < f.startDate || !f.pct) return;
    const end = fieldEnd(f, segs);
    if (end && date > end) return;
    total += f.pct;
  });
  return total;
}

function findOverAllocDays(fields, segs) {
  let maxEnd = GS;
  fields.forEach(f => { const e = fieldEnd(f, segs); if (e && e > maxEnd) maxEnd = e; });
  const scanEnd = addD(maxEnd, 30);
  const issues = [];
  let d = GS;
  while (d <= scanEnd) {
    const alloc = getAllocOnDate(fields, d, segs);
    if (alloc > 100) issues.push({ date: d, pct: alloc });
    d = addD(d, 1);
    if (issues.length > 500) break;
  }
  return issues;
}

function findUnderAllocDays(fields, segs) {
  let maxEnd = GS;
  fields.forEach(f => { const e = fieldEnd(f, segs); if (e && e > maxEnd) maxEnd = e; });
  const scanEnd = addD(maxEnd, 7);
  const issues = [];
  let d = GS;
  while (d <= scanEnd) {
    const alloc = getAllocOnDate(fields, d, segs);
    if (alloc > 0 && alloc < 100 && dailyReq(d, segs) > 0) issues.push({ date: d, pct: alloc });
    d = addD(d, 1);
    if (issues.length > 500) break;
  }
  return issues;
}

function summarizeRanges(days) {
  if (!days.length) return [];
  const sorted = [...days].sort((a,b) => a.date.localeCompare(b.date));
  const ranges = [];
  let start = sorted[0], prev = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    if (diffD(prev.date, sorted[i].date) === 1 && Math.abs(sorted[i].pct - prev.pct) < 1) {
      prev = sorted[i];
    } else {
      ranges.push({ from: start.date, to: prev.date, pct: start.pct });
      start = sorted[i]; prev = sorted[i];
    }
  }
  ranges.push({ from: start.date, to: prev.date, pct: start.pct });
  return ranges.slice(0, 10);
}

// ═══ Meditation calc ═══
// Phase 1 (Week 1-2): 5分/回 × 1 = 5分/日
// Phase 2 (Week 3-8): 週1分ずつ延長, w8で11分/回 (上限15分)
// Phase 3 (Week 9-16): 15分/回スタート、週1分ずつ延長、w14で20分(以降cap)
// Phase 4 (Week 17~): 20分/回スタート、週1分ずつ延長、w27で30分(以降cap)
//
// 瞑想もスケジュール(セグメント列)で管理。各セグメントは {from, vStart}。
// vStart は「仮想開始日」で、effectiveWeek = ceil((diffD(vStart,date)+1)/7)。
// 目標(分)を変更すると、その分に対応するプログラム週へ vStart をずらす
// (＝フェーズと実践法も連動してずれる)。過去は古いセグメントで凍結。
function medGenesisSched(startDate) {
  const s = startDate || MED_START_DEFAULT;
  return { past: [], current: [ { from: s, vStart: s } ], future: [] };
}
function getMedSegs(state) {
  const c = state && state.medSchedule && Array.isArray(state.medSchedule.current) && state.medSchedule.current.length
    ? state.medSchedule.current : null;
  if (c) return c;
  const s = (state && state.meditation && state.meditation.startDate) || MED_START_DEFAULT;
  return [ { from: s, vStart: s } ];
}
function medActiveVStart(medSegs, date) {
  for (let i = medSegs.length - 1; i >= 0; i--) { if (medSegs[i].from <= date) return medSegs[i].vStart; }
  return medSegs[0] ? medSegs[0].vStart : null;
}
function medWeek(date, medSegs) {
  const vs = medActiveVStart(medSegs, date);
  if (!vs) return 0;
  const day = diffD(vs, date) + 1;
  return day <= 0 ? 0 : Math.ceil(day / 7);
}
// 週番号→1回あたりの分(プログラム定義)
function medPerSessionByWeek(w) {
  if (w <= 0) return 0;
  if (w <= 2) return 5;
  if (w <= 8) return Math.min(5 + (w - 2), 15);
  if (w <= 16) return Math.min(15 + (w - 9), 20);
  return Math.min(20 + (w - 17), 30);
}
function medPhaseByWeek(w) {
  if (w <= 0) return 0;
  if (w <= 2) return 1;
  if (w <= 8) return 2;
  if (w <= 16) return 3;
  return 4;
}
function medPhase(date, medSegs) { return medPhaseByWeek(medWeek(date, medSegs)); }
function medPerSessionPlan(date, medSegs) { return medPerSessionByWeek(medWeek(date, medSegs)); }
function medDailyPlan(date, medSegs) { return medPerSessionPlan(date, medSegs) * 1; }
function medDefaultPracticeByWeek(w) {
  const p = medPhaseByWeek(w);
  if (p === 3) return "隨息観";
  if (p === 4) return "只管打坐";
  return "数息観";
}
function medDefaultPractice(date, medSegs) { return medDefaultPracticeByWeek(medWeek(date, medSegs)); }
// 目標分→最も近いプログラム週(タイは小さい週)。値はギャップ(12-14分)を含むため近傍にスナップ。
function medInvPerSession(M) {
  let best = 1, bestDiff = Infinity;
  for (let w = 1; w <= 400; w++) {
    const v = medPerSessionByWeek(w);
    const diff = Math.abs(v - M);
    if (diff < bestDiff) { bestDiff = diff; best = w; }
    if (v >= 30 && M >= 30) { best = w; break; }
  }
  return best;
}
// 瞑想目標を適用(今日から、フェーズずらし)。
function applyMedTarget(state, minutes) {
  const sched = state.medSchedule && Array.isArray(state.medSchedule.current) && state.medSchedule.current.length
    ? state.medSchedule : medGenesisSched(state.meditation && state.meditation.startDate);
  const segs = sched.current;
  const C = today();
  const w = medInvPerSession(minutes);
  const vStart = addD(C, -7 * (w - 1));
  const newSeg = { from: C, vStart };
  const last = segs[segs.length - 1];
  const newCurrent = (last && last.from === C) ? [ ...segs.slice(0, -1), newSeg ] : [ ...segs, newSeg ];
  return { ...state, medSchedule: { past: [ ...sched.past, segs ], current: newCurrent, future: [] } };
}
function medUndo(state) {
  const s = state.medSchedule; if (!s || !s.past.length) return state;
  return { ...state, medSchedule: { past: s.past.slice(0, -1), current: s.past[s.past.length - 1], future: [ s.current, ...s.future ] } };
}
function medRedo(state) {
  const s = state.medSchedule; if (!s || !s.future.length) return state;
  return { ...state, medSchedule: { past: [ ...s.past, s.current ], current: s.future[0], future: s.future.slice(1) } };
}
function medCheckMissTwice(meditation) {
  if (!meditation || !meditation.startDate) return null;
  const t = today();
  if (t < meditation.startDate) return null;
  const sessions = meditation.sessions || {};
  const has = d => Array.isArray(sessions[d]) && sessions[d].length > 0;
  const todayHas = has(t);
  let miss = 0, d = addD(t, -1);
  while (d >= meditation.startDate && !has(d)) {
    miss++;
    d = addD(d, -1);
    if (miss > 60) break;
  }
  if (miss >= 2 && !todayHas) {
    return { level: "red", text: `${miss}日連続で記録なし。今日記録すれば習慣を取り戻せます。` };
  }
  if (miss === 1 && !todayHas) {
    return { level: "yellow", text: "昨日は記録なし。Never miss twice — 今日はやりましょう。" };
  }
  return null;
}

// ═══ Storage ═══
const SK="study-v6";
const GAS_URL="https://script.google.com/macros/s/AKfycbxBWoJBEKDTPzAP8lo94OoXdYyS92TlcFu3EG3gmewWxbHE-jeJ8VsnNDqElEISueK9/exec";
const API_KEY="kano_study_2026_secret";

function loadLocal(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function saveLocal(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}

function migrateMed(state){
  if(!state) return state;
  if(!state.meditation || typeof state.meditation !== "object"){
    state.meditation = {startDate: MED_START_DEFAULT, sessions: {}};
  } else {
    if(!state.meditation.startDate) state.meditation.startDate = MED_START_DEFAULT;
    if(!state.meditation.sessions || typeof state.meditation.sessions !== "object") state.meditation.sessions = {};
  }
  // 勉強スケジュール(目標履歴)。なければ genesis(現行挙動を完全再現)で初期化。
  if(!state.studySchedule || !Array.isArray(state.studySchedule.current) || !state.studySchedule.current.length){
    state.studySchedule = genesisStudySched();
  } else {
    if(!Array.isArray(state.studySchedule.past)) state.studySchedule.past = [];
    if(!Array.isArray(state.studySchedule.future)) state.studySchedule.future = [];
  }
  // 瞑想スケジュール(目標履歴)。なければ genesis(startDate基準)で初期化。
  if(!state.medSchedule || !Array.isArray(state.medSchedule.current) || !state.medSchedule.current.length){
    state.medSchedule = medGenesisSched(state.meditation.startDate);
  } else {
    if(!Array.isArray(state.medSchedule.past)) state.medSchedule.past = [];
    if(!Array.isArray(state.medSchedule.future)) state.medSchedule.future = [];
  }
  return state;
}

async function loadCloud(){
  try{
    const res=await fetch(GAS_URL+"?key="+encodeURIComponent(API_KEY));
    if(res.ok){const d=await res.json();if(d&&d.fields!==undefined)return d;}
  }catch{}
  return new Promise((resolve)=>{
    const cb="_gcb"+Date.now();
    const timer=setTimeout(()=>{delete window[cb];resolve(null);},8000);
    window[cb]=(data)=>{
      clearTimeout(timer);delete window[cb];
      try{if(typeof data==="string")data=JSON.parse(data);resolve(data&&data.fields!==undefined?data:null);}catch{resolve(null);}
    };
    const s=document.createElement("script");
    s.src=GAS_URL+"?key="+encodeURIComponent(API_KEY)+"&callback="+cb;
    s.onerror=()=>{clearTimeout(timer);delete window[cb];resolve(null);};
    document.head.appendChild(s);
    s.addEventListener("load",()=>{try{document.head.removeChild(s);}catch{}});
  });
}

async function saveCloud(d){
  const json=JSON.stringify(d);
  try{
    const res=await fetch(GAS_URL+"?key="+encodeURIComponent(API_KEY),{method:"POST",body:json,headers:{"Content-Type":"text/plain"}});
    if(res.ok) return true;
  }catch{}
  return new Promise((resolve)=>{
    try{
      const fn="gsf"+Date.now();
      const ifr=document.createElement("iframe");
      ifr.name=fn;ifr.style.cssText="display:none;";
      document.body.appendChild(ifr);
      let done=false;
      const onMsg=(ev)=>{if(ev.data==="gas_save_ok"){done=true;fin(true);}if(ev.data==="gas_save_error"){done=true;fin(false);}};
      window.addEventListener("message",onMsg);
      const fin=(ok)=>{window.removeEventListener("message",onMsg);setTimeout(()=>{try{document.body.removeChild(frm);}catch{}try{document.body.removeChild(ifr);}catch{}},500);resolve(ok);};
      const frm=document.createElement("form");
      frm.method="POST";frm.action=GAS_URL;frm.target=fn;
      const keyInp=document.createElement("input");
      keyInp.type="hidden";keyInp.name="key";keyInp.value=API_KEY;
      frm.appendChild(keyInp);
      const dataInp=document.createElement("input");
      dataInp.type="hidden";dataInp.name="data";dataInp.value=json;
      frm.appendChild(dataInp);document.body.appendChild(frm);frm.submit();
      setTimeout(()=>{if(!done)fin(true);},6000);
    }catch{resolve(false);}
  });
}

async function load(){
  const cloud=await loadCloud();
  if(cloud){const m=migrateMed(cloud);saveLocal(m);return m;}
  const local=await loadLocal();
  return migrateMed(local);
}
function save(d){saveLocal(d);}

// ═══ Styles ═══
const card={background:"linear-gradient(135deg,#0f1419,#1a1f2e)",borderRadius:16,padding:"18px 22px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:16};
const inp={width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box"};
const lb={color:"rgba(255,255,255,0.45)",fontSize:11,display:"block",marginBottom:4};
const CL=["#4ade80","#818cf8","#f87171","#fbbf24","#22d3ee","#e879f9","#fb923c","#a3e635"];
function fmtRange(w){if(w<4)return`${w}週間`;const m=Math.round(w/4.33);if(m<12)return`約${m}ヶ月`;return`約${(w/52).toFixed(1)}年`;}

// ═══ SVG: Stacked Bar Chart ═══
function StackedChart({ days: rawDays, fields, w=540, h=220, showCapLine=false, title, legend }) {
  if (!rawDays.length) return null;
  let days = rawDays;
  if (rawDays.length > 120) {
    const bs = Math.ceil(rawDays.length / 120);
    days = [];
    for (let i = 0; i < rawDays.length; i += bs) {
      const chunk = rawDays.slice(i, i + bs);
      const avgSegs = chunk[0].segments.map((seg, si) => ({
        ...seg, val: chunk.reduce((s, d) => s + (d.segments[si]?.val || 0), 0) / chunk.length
      }));
      const avgCap = chunk.reduce((s, d) => s + (d.cap || 0), 0) / chunk.length;
      const hasToday = chunk.some(d => d.d === today());
      days.push({ ...chunk[0], segments: avgSegs, cap: avgCap, total: avgSegs.reduce((s, x) => s + x.val, 0), d: chunk[0].d, lbl: chunk[0].lbl });
      if (hasToday) days[days.length - 1].d = today();
    }
  }
  let maxY = 0.1;
  for (let i = 0; i < days.length; i++) { const v = Math.max(days[i].total || 0, days[i].cap || 0); if (v > maxY) maxY = v; }
  maxY *= 1.1;
  const pad={t:20,b:32,l:44,r:10};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const n=days.length;
  const barSlot=pw/n;
  const barW=Math.max(1,Math.min(14,barSlot*0.7));
  const xC=(i)=>pad.l+(i+0.5)*barSlot;
  const yS=(v)=>pad.t+ph-(v/maxY)*ph;
  const todayIdx=days.findIndex(d=>d.d===today());
  const labelStep=Math.max(1,Math.floor(n/14));
  const yTicks=5; const yStep=maxY/yTicks;
  let capPath="";
  if(showCapLine){
    days.forEach((d,i)=>{
      if(d.cap===undefined)return;
      capPath+=(i===0?"M":"L")+`${xC(i)},${yS(d.cap)}`;
    });
  }
  return (
    <div style={{...card,padding:"14px 6px 6px"}}>
      {title && <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,marginBottom:4,padding:"0 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        {legend && <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{legend}</div>}
      </div>}
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:"auto",display:"block"}}>
        {Array.from({length:yTicks+1},(_,i)=>{
          const v=Math.round(yStep*i);
          return <g key={i}><line x1={pad.l} x2={w-pad.r} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.04)"/>
            <text x={pad.l-5} y={yS(v)+3} fill="rgba(255,255,255,0.25)" fontSize="9" textAnchor="end">{v}</text></g>;
        })}
        {todayIdx>=0 && <rect x={pad.l+todayIdx*barSlot} y={pad.t} width={barSlot} height={ph} fill="rgba(251,191,36,0.06)"/>}
        {days.map((day,i)=>{
          let cumH=0;
          return <g key={i}>{day.segments.map((seg,si)=>{
            const segH=(seg.val/maxY)*ph;
            const y=yS(0)-cumH-segH;
            cumH+=segH;
            if(seg.val<=0) return null;
            return seg.dashed
              ? <rect key={si} x={xC(i)-barW/2} y={y} width={barW} height={Math.max(segH,0.5)} rx={1}
                  fill={seg.color} opacity={0.25} stroke={seg.color} strokeWidth="1" strokeDasharray="3 2"/>
              : <rect key={si} x={xC(i)-barW/2} y={y} width={barW} height={Math.max(segH,0.5)} rx={1}
                  fill={seg.color} opacity={0.75}/>;
          })}</g>;
        })}
        {showCapLine && capPath && <path d={capPath} fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5" strokeDasharray="5 3"/>}
        {todayIdx>=0 && <>
          <line x1={xC(todayIdx)} x2={xC(todayIdx)} y1={pad.t-4} y2={pad.t+ph+2} stroke="#fbbf24" strokeWidth="1.5" strokeDasharray="3 3"/>

        </>}
        {days.map((d,i)=>{
          if(i%labelStep!==0&&i!==todayIdx)return null;
          return <text key={i} x={xC(i)} y={h-6} fill={i===todayIdx?"#fbbf24":"rgba(255,255,255,0.25)"} fontSize="8" textAnchor="middle" fontWeight={i===todayIdx?"600":"400"}>{d.lbl}</text>;
        })}
      </svg>
    </div>
  );
}

// ═══ SVG: Plan vs Actual daily bars (successColor 上書き可) ═══
function DailyCompareChart({ data: rawData, w=540, h=220, successColor="#4ade80", failColor="#f87171" }) {
  if (!rawData.length) return null;
  let data = rawData;
  if (rawData.length > 120) {
    const bucketSize = Math.ceil(rawData.length / 120);
    data = [];
    for (let i = 0; i < rawData.length; i += bucketSize) {
      const chunk = rawData.slice(i, i + bucketSize);
      const avgPlan = chunk.reduce((s, d) => s + d.plan, 0) / chunk.length;
      const pastChunk = chunk.filter(d => d.actual !== null);
      const avgActual = pastChunk.length > 0 ? pastChunk.reduce((s, d) => s + d.actual, 0) / pastChunk.length : null;
      const hasToday = chunk.some(d => d.isToday);
      data.push({ d: chunk[0].d, lbl: chunk[0].lbl, plan: avgPlan, actual: avgActual, isToday: hasToday });
    }
  }
  let maxY = 0.1;
  for (let i = 0; i < data.length; i++) { const v = Math.max(data[i].plan, data[i].actual ?? 0); if (v > maxY) maxY = v; }
  maxY *= 1.1;
  const pad={t:20,b:32,l:44,r:10};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const n=data.length;
  const barSlot=pw/n;
  const barW=Math.max(1,Math.min(12,barSlot*0.35));
  const gap=Math.max(0.5,barW*0.15);
  const xC=(i)=>pad.l+(i+0.5)*barSlot;
  const yS=(v)=>pad.t+ph-(v/maxY)*ph;
  const todayIdx=data.findIndex(d=>d.isToday);
  const labelStep=Math.max(1,Math.floor(n/14));
  const yTicks=5;const yStep=maxY/yTicks;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:"auto",display:"block"}}>
      {Array.from({length:yTicks+1},(_,i)=>{
        const v=Math.round(yStep*i);
        return <g key={i}><line x1={pad.l} x2={w-pad.r} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.04)"/>
          <text x={pad.l-5} y={yS(v)+3} fill="rgba(255,255,255,0.25)" fontSize="9" textAnchor="end">{v}</text></g>;
      })}
      {todayIdx>=0&&<rect x={pad.l+todayIdx*barSlot} y={pad.t} width={barSlot} height={ph} fill="rgba(251,191,36,0.06)"/>}
      {data.map((d,i)=>{
        const cx=xC(i);
        const planH=(d.plan/maxY)*ph;
        const actH=d.actual!==null?(d.actual/maxY)*ph:0;
        return <g key={i}>
          {d.plan>0 && <rect x={cx-barW-gap/2} y={yS(d.plan)} width={barW} height={Math.max(planH,0.5)} rx={1} fill="rgba(255,255,255,0.15)"/>}
          {d.actual!==null&&d.actual>0&&<rect x={cx+gap/2} y={yS(d.actual)} width={barW} height={Math.max(actH,0.5)} rx={1} fill={d.actual>=d.plan&&d.plan>0?successColor:failColor} opacity={0.8}/>}
        </g>;
      })}
      {todayIdx>=0&&<>
        <line x1={xC(todayIdx)} x2={xC(todayIdx)} y1={pad.t-4} y2={pad.t+ph+2} stroke="#fbbf24" strokeWidth="1.5" strokeDasharray="3 3"/>
        <text x={xC(todayIdx)} y={pad.t-6} fill="#fbbf24" fontSize="9" textAnchor="middle" fontWeight="600">今日</text>
      </>}
      {data.map((d,i)=>{
        if(i%labelStep!==0&&i!==todayIdx)return null;
        return <text key={i} x={xC(i)} y={h-6} fill={i===todayIdx?"#fbbf24":"rgba(255,255,255,0.25)"} fontSize="8" textAnchor="middle" fontWeight={i===todayIdx?"600":"400"}>{d.lbl}</text>;
      })}
    </svg>
  );
}

// ═══ Build chart data helpers ═══
function buildDailyCompare(state, ff, halfWeeks, offsetDays=0) {
  const { fields, logs } = state;
  const segs=getSegs(state);
  const t=today(); const halfDays=halfWeeks*7;
  const startD=addD(t,-halfDays+offsetDays), endD=addD(t,halfDays+offsetDays);
  const totalDays=diffD(startD,endD)+1;
  if (totalDays <= 0) return [];
  const af=ff?fields.filter(f=>f.id===ff):fields;
  const endMap=new Map();
  af.forEach(f=>{endMap.set(f.id, fieldEnd(f,segs));});
  const out=[];
  for(let i=0;i<totalDays;i++){
    const d=addD(startD,i);
    let dp=0;
    af.forEach(f=>{
      const end=endMap.get(f.id);
      if(d>=f.startDate && f.pct && (!end||d<=end)) dp+=fieldReq(f,d,segs);
    });
    dp=Math.round(dp*10)/10;
    let da=0;
    const ents=Array.isArray(logs[d])?logs[d]:[];
    ents.forEach(e=>{const f=fields.find(x=>x.id===e.fid);if(!f||(ff&&f.id!==ff))return;const b=f.books.find(x=>x.id===e.bid);if(b)da+=e.pg*(b.coeff||1);});
    const hasData=d<=t||ents.length>0;
    out.push({d,lbl:fS(d),plan:dp,actual:hasData?Math.round(da*10)/10:null,isToday:d===t});
  }
  return out;
}

function buildPlanActualChart(state, halfWeeks, offsetDays=0) {
  const { fields, logs } = state;
  const segs=getSegs(state);
  const t=today(); const halfDays=halfWeeks*7;
  const startD=addD(t,-halfDays+offsetDays), endD=addD(t,halfDays+offsetDays);
  const totalDays=diffD(startD,endD)+1;
  if (totalDays <= 0) return [];
  const endMap=new Map();
  fields.forEach(f=>{endMap.set(f.id, fieldEnd(f,segs));});
  const out=[];
  for(let i=0;i<totalDays;i++){
    const d=addD(startD,i);
    const ents=Array.isArray(logs[d])?logs[d]:[];
    const hasLog=ents.length>0;
    const isFuture=d>t && !hasLog;
    const segments=[];
    if(isFuture){
      fields.forEach((f,fi)=>{
        const end=endMap.get(f.id);
        let val=0;
        if(d>=f.startDate && f.pct && (!end||d<=end)) val=fieldReq(f,d,segs);
        segments.push({fid:f.id,val,color:CL[fi%CL.length],dashed:true});
      });
    } else {
      fields.forEach((f,fi)=>{
        let val=0;
        ents.forEach(e=>{
          if(e.fid!==f.id) return;
          const b=f.books.find(x=>x.id===e.bid);
          if(b) val+=e.pg*(b.coeff||1);
        });
        segments.push({fid:f.id,val,color:CL[fi%CL.length],dashed:false});
      });
    }
    const cap=dailyReq(d,segs);
    out.push({d,lbl:fS(d),cap,segments,total:segments.reduce((s,x)=>s+x.val,0)});
  }
  return out;
}

function buildMedDailyCompare(state, halfWeeks, offsetDays=0) {
  const med = state.meditation;
  if (!med || !med.startDate) return [];
  const medSegs = getMedSegs(state);
  const t = today();
  const halfDays = halfWeeks * 7;
  const startD = addD(t, -halfDays+offsetDays);
  const endD = addD(t, halfDays+offsetDays);
  const totalDays = diffD(startD, endD) + 1;
  if (totalDays <= 0) return [];
  const out = [];
  for (let i = 0; i < totalDays; i++) {
    const d = addD(startD, i);
    const plan = (d >= med.startDate) ? medDailyPlan(d, medSegs) : 0;
    const sess = Array.isArray(med.sessions[d]) ? med.sessions[d] : [];
    const actual = sess.reduce((s, x) => s + (x.duration || 0), 0);
    const hasData = d <= t || sess.length > 0;
    out.push({ d, lbl: fS(d), plan, actual: hasData ? actual : null, isToday: d === t });
  }
  return out;
}

function calcCum(state, ff) {
  const {fields,logs}=state; const t=today();
  const segs=getSegs(state);
  const af=ff?fields.filter(f=>f.id===ff):fields;
  let cumA=0;
  // 各分野の計画累計は fieldEff(=総実質p) で頭打ちにする。
  // → 読了/無効で完了した分野は、その日以降ノルマを積み増さない(計画の再調整)。
  //   無効化で fieldEff が縮むと、ここにも自動で反映される。
  const teMap=new Map(); af.forEach(f=>teMap.set(f.id, fieldEff(f)));
  const cumPF=new Map(); af.forEach(f=>cumPF.set(f.id, 0));
  let latestLog=t;
  Object.keys(logs).forEach(d=>{if(d>latestLog&&Array.isArray(logs[d])&&logs[d].length>0)latestLog=d;});
  const endDate=latestLog>t?latestLog:t;
  const totalDays=diffD(GS,endDate)+1;
  if(totalDays<=0) return {pageDiff:0,daysDiff:0,cumPlan:0,cumActual:0};
  for(let i=0;i<totalDays;i++){
    const d=addD(GS,i);
    af.forEach(f=>{
      if(d<f.startDate) return;
      const te=teMap.get(f.id); const cur=cumPF.get(f.id);
      if(cur>=te) return;
      cumPF.set(f.id, Math.min(cur+fieldReq(f,d,segs), te));
    });
    let da=0; const ents=Array.isArray(logs[d])?logs[d]:[];
    ents.forEach(e=>{const f=fields.find(x=>x.id===e.fid);if(!f||(ff&&f.id!==ff))return;const b=f.books.find(x=>x.id===e.bid);if(b)da+=e.pg*(b.coeff||1);});
    cumA+=da;
  }
  let cumP=0; cumPF.forEach(v=>cumP+=v);
  const pageDiff=cumA-cumP;
  const todayReq=af.reduce((s,f)=>s+(fieldComplete(f)?0:fieldReq(f,t,segs)),0);
  const daysDiff=todayReq>0?pageDiff/todayReq:0;
  return {pageDiff:Math.round(pageDiff*10)/10,daysDiff:Math.round(daysDiff*10)/10,cumPlan:Math.round(cumP),cumActual:Math.round(cumA)};
}

                      <span style={{position:"absolute",left:0,color:MED_COLOR,fontWeight:700}}>·</span>
                      {line}
                    </li>
                  ))}
                </ul>
              ) : (
                <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,lineHeight:1.7,fontFamily:"'Noto Sans JP',sans-serif"}}>{step.summary}</div>
              )}
              {isExp && step.details && (
                <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${MED_COLOR}22`,fontFamily:"'Noto Sans JP',sans-serif"}}>
                  {step.details.map((line,i)=>(
                    line === "" ? <div key={i} style={{height:6}}/> :
                    <div key={i} style={{color:"rgba(255,255,255,0.55)",fontSize:11.5,lineHeight:1.85,marginBottom:4}}>{line}</div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        <button onClick={onClose} style={{width:"100%",background:"rgba(167,139,250,0.1)",color:MED_COLOR,border:`1px solid ${MED_COLOR}33`,borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600,marginTop:8,fontFamily:"'Noto Sans JP',sans-serif"}}>閉じる</button>
        <div style={{textAlign:"center",marginTop:14,color:"rgba(255,255,255,0.2)",fontSize:10,fontStyle:"italic",letterSpacing:"0.1em"}}>"Just sit." ── 道元</div>
      </div>
    </div>
  );
}

// ═══ Undo/Redo control row ═══
function HistoryControls({canUndo, canRedo, onUndo, onRedo, accent="#fbbf24", undoCount=0, redoCount=0}) {
  return (
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <button onClick={onUndo} disabled={!canUndo} style={{
        flex:1,background:canUndo?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",
        color:canUndo?"rgba(255,255,255,0.65)":"rgba(255,255,255,0.18)",
        border:`1px solid ${canUndo?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.05)"}`,
        borderRadius:9,padding:"9px 8px",fontSize:12,fontWeight:600,cursor:canUndo?"pointer":"default"
      }}>↶ 戻す{undoCount>0?` (${undoCount})`:""}</button>
      <button onClick={onRedo} disabled={!canRedo} style={{
        flex:1,background:canRedo?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",
        color:canRedo?"rgba(255,255,255,0.65)":"rgba(255,255,255,0.18)",
        border:`1px solid ${canRedo?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.05)"}`,
        borderRadius:9,padding:"9px 8px",fontSize:12,fontWeight:600,cursor:canRedo?"pointer":"default"
      }}>進む ↷{redoCount>0?` (${redoCount})`:""}</button>
    </div>
  );
}

// ═══ Tab 1: Plan ═══
function PlanTab({state,persist}) {
  const [ed,setEd]=useState(null);
  const [bt,setBt]=useState("");const [bp,setBp]=useState("");const [bc,setBc]=useState("1.0");
  const [showProc,setShowProc]=useState(false);

  const segs=useMemo(()=>getSegs(state),[state]);
  const medSegs=useMemo(()=>getMedSegs(state),[state]);

  // 目標設定 (study)
  const caps=useMemo(()=>curStudyCaps(segs),[segs]);
  const [wkInp,setWkInp]=useState(String(Math.round(caps.weekday)));
  const [weInp,setWeInp]=useState(String(Math.round(caps.weekend)));
  const [confirmStudy,setConfirmStudy]=useState(null);
  useEffect(()=>{ setWkInp(String(Math.round(caps.weekday))); setWeInp(String(Math.round(caps.weekend))); },[caps.weekday,caps.weekend]);

  // 目標設定 (meditation)
  const [medInp,setMedInp]=useState("");
  const [confirmMed,setConfirmMed]=useState(null);

  const studyHist=state.studySchedule||{past:[],current:segs,future:[]};
  const medHist=state.medSchedule||{past:[],current:medSegs,future:[]};

  function requestStudyApply(){
    const W=parseFloat(wkInp), E=parseFloat(weInp);
    if(!(W>0)||!(E>0))return;
    setConfirmStudy({W,E});
  }
  function doStudyApply(){
    const {W,E}=confirmStudy;
    persist(applyStudyTarget(state, W, E));
    setConfirmStudy(null);
  }
  function requestMedApply(){
    const M=parseFloat(medInp);
    if(!(M>0))return;
    const w=medInvPerSession(M);
    const snapped=medPerSessionByWeek(w);
    setConfirmMed({M,w,snapped,phase:medPhaseByWeek(w),practice:medDefaultPracticeByWeek(w)});
  }
  function doMedApply(){
    persist(applyMedTarget(state, confirmMed.M));
    setConfirmMed(null);setMedInp("");
  }

  function openNew(){setBt("");setBp("");setBc("1.0");setEd({id:gid(),name:"",cat:"other",pct:"",startDate:GS,books:[]});}
  function openEdit(f){setBt("");setBp("");setBc("1.0");setEd(JSON.parse(JSON.stringify(f)));}
  function addBook(){const p=parseInt(bp);if(!bt||!p||p<=0)return;setEd(prev=>({...prev,books:[...prev.books,{id:gid(),title:bt,totalPages:p,coeff:parseFloat(bc)||1,pagesRead:0}]}));setBt("");setBp("");setBc("1.0");}
  function removeBook(bid){setEd(prev=>({...prev,books:prev.books.filter(b=>b.id!==bid)}));}
  function updateBook(bid,key,val){setEd(prev=>({...prev,books:prev.books.map(b=>b.id!==bid?b:{...b,[key]:val})}));}
  function saveField(){
    if(!ed||!ed.name||!ed.pct||ed.books.length===0)return;
    const pn=parseFloat(ed.pct);if(!pn||pn<=0)return;
    const f={...ed,pct:pn,books:ed.books.map(b=>({...b,
      totalPages:Math.max(1,b.totalPages||1),
      coeff:Math.max(0.1,b.coeff||1),
      pagesRead:Math.min(b.pagesRead||0,Math.max(1,b.totalPages||1))
    }))};
    const idx=state.fields.findIndex(x=>x.id===f.id);
    persist({...state,fields:idx>=0?state.fields.map(x=>x.id===f.id?f:x):[...state.fields,f]});
    setEd(null);
  }

  const overDays = useMemo(()=>findOverAllocDays(state.fields,segs),[state.fields,segs]);
  const underDays = useMemo(()=>findUnderAllocDays(state.fields,segs),[state.fields,segs]);
  const underSoon = useMemo(()=>{
    const t=today(); const weekEnd=addD(t,7);
    return underDays.filter(d=>d.date>=t && d.date<=weekEnd);
  },[underDays]);
  const underLater = useMemo(()=>{
    const weekEnd=addD(today(),7);
    return underDays.filter(d=>d.date>weekEnd);
  },[underDays]);
  const overRanges = useMemo(()=>summarizeRanges(overDays),[overDays]);
  const underSoonRanges = useMemo(()=>summarizeRanges(underSoon),[underSoon]);
  const underLaterRanges = useMemo(()=>summarizeRanges(underLater),[underLater]);
  const todayAlloc = useMemo(()=>getAllocOnDate(state.fields, today(), segs),[state.fields,segs]);

  // 完了分野を末尾に、色は元のindex基準で保持
  const orderedFields = useMemo(()=>{
    return state.fields.map((f,i)=>({f,i,done:fieldComplete(f)}))
      .sort((a,b)=>(a.done?1:0)-(b.done?1:0));
  },[state.fields]);

  const previewEnd = useMemo(()=>{
    if(!ed||ed.books.length===0||!ed.pct)return null;
    const pn=parseFloat(ed.pct);if(!pn||pn<=0)return null;
    return fieldEnd({...ed,pct:pn},segs);
  },[ed,segs]);
  const previewEff=ed?ed.books.reduce((s,b)=>s+bookEff(b),0):0;

  // Meditation plan summary
  const med=state.meditation||{startDate:MED_START_DEFAULT,sessions:{}};
  const t=today();
  const medPh=medPhase(t,medSegs);
  const medWk=medWeek(t,medSegs);
  const perSession=medPerSessionPlan(t,medSegs);
  const dailyTarget=medDailyPlan(t,medSegs);
  const defPractice=medDefaultPractice(t,medSegs);

  return (
    <div>
      <div style={card}>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600,marginBottom:8}}>📋 基本設定</div>
        <div style={{color:"rgba(255,255,255,0.35)",fontSize:12,lineHeight:1.8}}>
          開始: <span style={{color:"#fbbf24"}}>{fF(GS)}(月)</span>　初日1p→20週で定着<br/>
          毎日+{INCR.toFixed(3)}p（休日×1.5）　バッファなし<br/>
          <span style={{color:"rgba(255,255,255,0.2)"}}>※ 1実質page≈4分。実page×係数＝実質page。</span>
        </div>
      </div>

      {/* ═══ 目標設定 (平日/休日) ═══ */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600}}>🎯 目標値の設定</span>
          <span style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>変更は今日から適用</span>
        </div>
        <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginBottom:10,lineHeight:1.7}}>
          現在の上限：平日 <span style={{color:"#fbbf24",fontWeight:600}}>{Math.round(caps.weekday)}p</span> / 休日 <span style={{color:"#fbbf24",fontWeight:600}}>{Math.round(caps.weekend)}p</span><br/>
          引き上げ時は毎日+{INCR.toFixed(3)}pずつ(休日×1.5)で目標まで上昇。引き下げ時は即日反映。
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1}}><label style={lb}>平日 目標(p/日)</label><input type="number" value={wkInp} onChange={e=>setWkInp(e.target.value)} style={{...inp,fontSize:15,fontWeight:700}}/></div>
          <div style={{flex:1}}><label style={lb}>休日 目標(p/日)</label><input type="number" value={weInp} onChange={e=>setWeInp(e.target.value)} style={{...inp,fontSize:15,fontWeight:700}}/></div>
        </div>
        <button onClick={requestStudyApply} style={{width:"100%",background:"rgba(251,191,36,0.14)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.3)",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:8}}>この目標を適用</button>
        <HistoryControls
          canUndo={!!(studyHist.past&&studyHist.past.length)} canRedo={!!(studyHist.future&&studyHist.future.length)}
          undoCount={(studyHist.past||[]).length} redoCount={(studyHist.future||[]).length}
          onUndo={()=>persist(studyUndo(state))} onRedo={()=>persist(studyRedo(state))} accent="#fbbf24"/>
      </div>

      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>今日 {fF(today())}({dw(today())}) のノルマ</span>
          <span style={{color:"#fbbf24",fontSize:20,fontWeight:700}}>{dailyReq(today(),segs).toFixed(1)}<span style={{fontSize:12,fontWeight:400}}> 実質p</span></span>
        </div>
        <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:4,textAlign:"right"}}>
          今日の割当: <span style={{color:todayAlloc===100?"#4ade80":todayAlloc>100?"#f87171":"#fbbf24",fontWeight:600}}>{todayAlloc}%</span>
        </div>
      </div>

      {overDays.length>0 && (
        <div style={{...card,borderColor:"rgba(248,113,113,0.3)",background:"linear-gradient(135deg,#1f1419,#1a1f2e)"}}>
          <div style={{color:"#f87171",fontSize:13,fontWeight:600,marginBottom:6}}>⚠️ 100%超過の日があります</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,lineHeight:1.8}}>
            {overRanges.map((r,i)=>(
              <div key={i}>
                {fF(r.from)}{r.from!==r.to?` 〜 ${fF(r.to)}`:""}：<span style={{color:"#f87171",fontWeight:600}}>{r.pct}%</span>
              </div>
            ))}
            {overDays.length>10 && <div style={{color:"rgba(255,255,255,0.2)"}}>…他{overDays.length-10}日</div>}
          </div>
        </div>
      )}

      {underSoon.length>0 && state.fields.length>0 && (
        <div style={{...card,borderColor:"rgba(248,113,113,0.3)",background:"linear-gradient(135deg,#1f1419,#1a1f2e)"}}>
          <div style={{color:"#f87171",fontSize:13,fontWeight:600,marginBottom:6}}>🚨 1週間以内に100%未満の日があります</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,lineHeight:1.8}}>
            {underSoonRanges.map((r,i)=>(
              <div key={i}>
                {fF(r.from)}{r.from!==r.to?` 〜 ${fF(r.to)}`:""}：<span style={{color:"#f87171",fontWeight:600}}>{r.pct}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {underLater.length>0 && state.fields.length>0 && (
        <div style={{...card,borderColor:"rgba(251,191,36,0.3)",background:"linear-gradient(135deg,#1f1a14,#1a1f2e)"}}>
          <div style={{color:"#fbbf24",fontSize:13,fontWeight:600,marginBottom:6}}>📢 100%未満の日があります</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,lineHeight:1.8}}>
            {underLaterRanges.map((r,i)=>(
              <div key={i}>
                {fF(r.from)}{r.from!==r.to?` 〜 ${fF(r.to)}`:""}：<span style={{color:"#fbbf24",fontWeight:600}}>{r.pct}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={card}>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600,marginBottom:8}}>分野一覧</div>
        {orderedFields.map(({f,i,done})=>{
          const col=CL[i%CL.length];
          const te=fieldEff(f);const end=fieldEnd(f,segs);const ae=logsEff(f,state.logs);
          const pct=te>0?Math.min(ae/te*100,100):0;
          return (
            <div key={f.id} style={{background:done?"rgba(255,255,255,0.015)":"rgba(255,255,255,0.03)",borderRadius:12,padding:"12px 16px",marginBottom:8,border:`1px solid ${col}${done?"14":"22"}`,opacity:done?0.5:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:col}}/>
                    <span style={{color:"#fff",fontWeight:600,fontSize:14}}>{f.name}</span>
                    <span style={{color:col,fontSize:12,fontWeight:700}}>{f.pct}%</span>
                    {done&&<span style={{color:"#4ade80",fontSize:10,fontWeight:600,marginLeft:2}}>✓ 完了</span>}
                  </div>
                  <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:3,marginLeft:16}}>
                    {fF(f.startDate)}〜{end?fF(end):""} · {f.books.length}冊 · 実質{te.toFixed(0)}p
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={()=>openEdit(f)} style={{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>編集</button>
                  <button onClick={()=>persist({...state,fields:state.fields.filter(x=>x.id!==f.id)})} style={{background:"rgba(248,113,113,0.1)",color:"#f87171",border:"none",borderRadius:8,padding:"6px 8px",fontSize:12,cursor:"pointer"}}>×</button>
                </div>
              </div>
              <div style={{marginTop:6,marginLeft:16}}>
                {f.books.map(b=>{
                  const pr=Math.min(b.pagesRead||0,b.totalPages);
                  return (
                  <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",opacity:b.disabled?0.6:1}}>
                    <span style={{color:"rgba(255,255,255,0.55)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,textDecoration:b.disabled?"line-through":"none"}}>{b.title}</span>
                    <span style={{color:"rgba(255,255,255,0.25)",fontSize:11,marginLeft:8,whiteSpace:"nowrap"}}>{b.disabled?`無効 · 既読${pr}p`:`${pr}/${b.totalPages}p ×${b.coeff} = ${bookEff(b).toFixed(0)}実質p`}</span>
                  </div>
                  );
                })}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:4,height:4,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:4}}/>
                </div>
                <span style={{color:"rgba(255,255,255,0.4)",fontSize:11}}>{pct.toFixed(0)}%</span>
              </div>
            </div>
          );
        })}
        <button onClick={openNew} style={{width:"100%",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",border:"1px dashed rgba(255,255,255,0.12)",borderRadius:12,padding:14,fontSize:13,cursor:"pointer",marginTop:8}}>+ 分野を追加</button>
      </div>

      {/* ═══ Meditation plan section ═══ */}
      <div style={{marginTop:28,paddingTop:20,borderTop:`1px solid ${MED_COLOR}22`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"0 4px"}}>
          <span style={{fontSize:18}}>🧘</span>
          <span style={{color:MED_COLOR,fontSize:13,fontWeight:600,letterSpacing:"0.04em"}}>瞑想プログラム</span>
          <div style={{flex:1,height:1,background:`linear-gradient(90deg,${MED_COLOR}33,transparent)`}}/>
        </div>

        <div style={{...card,borderColor:`${MED_COLOR}22`,background:"linear-gradient(135deg,#0f0d18,#15131f)"}}>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:10}}>
            開始: <span style={{color:MED_COLOR,fontWeight:600}}>{fF(med.startDate)}</span>
            {medPh===0 && <span style={{marginLeft:8,color:"rgba(255,255,255,0.3)"}}>(あと{Math.max(0,diffD(t,med.startDate))}日)</span>}
          </div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,lineHeight:1.9}}>
            <div>Phase 1 (Week 1-2): 5分 × 1 = 5分/日 (数息観)</div>
            <div>Phase 2 (Week 3-8): 週1分ずつ延長 → 11分/回 × 1 (数息観)</div>
            <div>Phase 3 (Week 9-16): 15分から週1分ずつ → 20分/回 × 1 (隨息観)</div>
            <div>Phase 4 (Week 17~): 20分から週1分ずつ → 30分/回 × 1 (只管打坐)</div>
          </div>
          {medPh>0 && (
            <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${MED_COLOR}22`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:MED_COLOR,fontSize:11,letterSpacing:"0.15em",fontStyle:"italic"}}>NOW · PHASE {medPh} · WEEK {medWk}</span>
              <span style={{color:"#fff",fontSize:13,fontWeight:600}}>{perSession}分 × 1 = {dailyTarget}分/日 ({defPractice})</span>
            </div>
          )}
        </div>

        {/* 瞑想 目標設定 */}
        <div style={{...card,borderColor:`${MED_COLOR}22`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{color:MED_COLOR,fontSize:12,fontWeight:600}}>🎯 1日の目標を設定</span>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>変更は今日から適用</span>
          </div>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginBottom:10,lineHeight:1.7}}>
            設定した分に最も近いプログラム週へ移動し、フェーズ・実践法も連動してずれます。以降は週+1分で進行。
          </div>
          <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-end"}}>

            <button onClick={requestMedApply} style={{flex:1,background:`${MED_COLOR}22`,color:MED_COLOR,border:`1px solid ${MED_COLOR}44`,borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>適用</button>
          </div>
          <HistoryControls
            canUndo={!!(medHist.past&&medHist.past.length)} canRedo={!!(medHist.future&&medHist.future.length)}
            undoCount={(medHist.past||[]).length} redoCount={(medHist.future||[]).length}

        </div>

      )}

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>

            <h3 style={{color:"#fff",fontSize:17,fontWeight:700,margin:"0 0 14px"}}>{state.fields.some(x=>x.id===ed.id)?"分野を編集":"新しい分野"}</h3>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:2}}><label style={lb}>分野名</label><input value={ed.name} onChange={e=>setEd({...ed,name:e.target.value})} placeholder="例: 投資" style={inp}/></div>
              <div style={{flex:1}}><label style={lb}>カテゴリ</label><select value={ed.cat} onChange={e=>setEd({...ed,cat:e.target.value})} style={{...inp,padding:8}}><option value="work">仕事</option><option value="other">その他</option></select></div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <div style={{flex:1}}><label style={lb}>割合(%)</label><input type="number" value={ed.pct} onChange={e=>setEd({...ed,pct:e.target.value})} placeholder="30" style={{...inp,fontSize:16,fontWeight:700}}/></div>
              <div style={{flex:1}}><label style={lb}>開始日</label><input type="date" value={ed.startDate} onChange={e=>setEd({...ed,startDate:e.target.value})} style={inp}/></div>
            </div>
            {previewEnd&&(
              <div style={{background:"rgba(251,191,36,0.08)",borderRadius:10,padding:"10px 14px",marginBottom:14,border:"1px solid rgba(251,191,36,0.1)"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>📅 完了予定</span><span style={{color:"#fbbf24",fontSize:14,fontWeight:700}}>{fF(previewEnd)}</span></div>
                <div style={{color:"rgba(255,255,255,0.2)",fontSize:10,marginTop:4}}>実質{previewEff.toFixed(0)}p · 全体の{ed.pct}% · 約{diffD(ed.startDate,previewEnd)}日</div>
              </div>
            )}
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,marginBottom:6}}>📚 本一覧</div>
            {ed.books.map(b=>(
              <div key={b.id} style={{padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:8,marginBottom:4,border:`1px solid ${b.disabled?"rgba(248,113,113,0.2)":"rgba(255,255,255,0.06)"}`,opacity:b.disabled?0.8:1}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>

                  <button onClick={()=>removeBook(b.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.2)",cursor:"pointer",fontSize:14,padding:"0 4px",flexShrink:0}}>×</button>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <input type="number" value={b.totalPages} onChange={e=>updateBook(b.id,"totalPages",parseInt(e.target.value)||0)} style={{...inp,width:65,padding:"4px 6px",fontSize:12,textAlign:"right"}}/>
                  <span style={{color:"rgba(255,255,255,0.3)",fontSize:11}}>p ×</span>
                  <input type="number" step="0.1" value={b.coeff} onChange={e=>updateBook(b.id,"coeff",parseFloat(e.target.value)||0)} style={{...inp,width:55,padding:"4px 6px",fontSize:12,textAlign:"right"}}/>
                  <span style={{color:b.disabled?"#f87171":"#fbbf24",fontSize:11,whiteSpace:"nowrap"}}>{b.disabled?`→ ${bookEff(b).toFixed(0)}実質p`:`= ${bookEff(b).toFixed(0)}実質p`}</span>
                </div>
                <label style={{display:"flex",alignItems:"center",gap:6,marginTop:8,cursor:"pointer",userSelect:"none"}}>
                  <input type="checkbox" checked={!!b.disabled} onChange={e=>updateBook(b.id,"disabled",e.target.checked)} style={{accentColor:"#f87171",width:14,height:14,cursor:"pointer",flexShrink:0}}/>
                  <span style={{color:b.disabled?"#f87171":"rgba(255,255,255,0.4)",fontSize:11}}>無効（残りページを計画から除外）</span>
                  {b.disabled&&<span style={{color:"rgba(255,255,255,0.3)",fontSize:10,marginLeft:"auto",whiteSpace:"nowrap"}}>読了{b.pagesRead||0}p / 全{b.totalPages}p</span>}
                </label>
              </div>
            ))}
            {ed.books.length===0&&<div style={{padding:10,color:"rgba(255,255,255,0.2)",fontSize:12,textAlign:"center"}}>本を追加してください</div>}
            <div style={{display:"flex",gap:6,marginTop:8,marginBottom:4,flexWrap:"wrap"}}>
              <input value={bt} onChange={e=>setBt(e.target.value)} placeholder="タイトル" onKeyDown={e=>{if(e.key==="Enter")addBook();}} style={{...inp,flex:"3 1 120px"}}/>
              <input type="number" value={bp} onChange={e=>setBp(e.target.value)} placeholder="p数" onKeyDown={e=>{if(e.key==="Enter")addBook();}} style={{...inp,flex:"1 1 55px"}}/>
              <input type="number" step="0.1" value={bc} onChange={e=>setBc(e.target.value)} placeholder="係数" style={{...inp,flex:"1 1 45px"}}/>
              <button onClick={addBook} style={{background:"rgba(74,222,128,0.15)",color:"#4ade80",border:"none",borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer"}}>+</button>
            </div>
            <div style={{color:"rgba(255,255,255,0.2)",fontSize:10,marginBottom:14}}>係数: 情報量が多い本→大(例:2.0), 軽い→小(例:0.5)。1実質page≈4分。</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEd(null)} style={{flex:1,background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13}}>キャンセル</button>
              <button onClick={saveField} style={{flex:1,background:"#fbbf24",color:"#000",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:700}}>保存</button>
            </div>
          </div>
        </div>
      )}

      {showProc && <MedProcedureModal onClose={()=>setShowProc(false)}/>}
    </div>
  );
}

// ═══ Tab 2: Chart ═══
function ChartTab({state}) {
  const [ff,setFf]=useState(null);
  const [hw,setHw]=useState(4);
  const [offsetDays,setOffsetDays]=useState(0);

  const segs=useMemo(()=>getSegs(state),[state]);
  const medSegs=useMemo(()=>getMedSegs(state),[state]);

  const compareData=useMemo(()=>buildDailyCompare(state,ff,hw,offsetDays),[state,ff,hw,offsetDays]);
  const paData=useMemo(()=>buildPlanActualChart(state,hw,offsetDays),[state,hw,offsetDays]);
  const cum=useMemo(()=>calcCum(state,ff),[state,ff]);
  const medCompareData=useMemo(()=>buildMedDailyCompare(state,hw,offsetDays),[state,hw,offsetDays]);
  const sur=cum.pageDiff>=0;
  const tw=hw*2;

  // 横スクロール(パン): ドラッグ + 矢印ボタン。3グラフ連動。
  const visibleDays=hw*14+1;
  const drag=useRef({active:false,startX:0,startOffset:0,width:1});
  const onPanDown=useCallback((e)=>{
    const w=e.currentTarget.clientWidth||1;
    drag.current={active:true,startX:e.clientX,startOffset:offsetDays,width:w};
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch{}
  },[offsetDays]);
  const onPanMove=useCallback((e)=>{
    if(!drag.current.active)return;
    const dx=e.clientX-drag.current.startX;
    const days=Math.round(-dx/drag.current.width*visibleDays);
    setOffsetDays(drag.current.startOffset+days);
  },[visibleDays]);
  const onPanUp=useCallback((e)=>{
    drag.current.active=false;
    try{e.currentTarget.releasePointerCapture(e.pointerId);}catch{}
  },[]);
  const panProps={
    onPointerDown:onPanDown,onPointerMove:onPanMove,onPointerUp:onPanUp,onPointerCancel:onPanUp,
    style:{touchAction:"pan-y",cursor:"grab"}
  };
  const panStep=Math.max(1,Math.round(hw*7/2));
  const stepOffset=(dir)=>setOffsetDays(o=>o+dir*panStep);

  const t=today();
  const med=state.meditation||{};
  const medPh=medPhase(t,medSegs);
  const medWk=medWeek(t,medSegs);
  const perSession=medPerSessionPlan(t,medSegs);
  const dailyTarget=medDailyPlan(t,medSegs);
  const defPractice=medDefaultPractice(t,medSegs);

  const fieldLegend=state.fields.map((f,i)=>(
    <div key={f.id} style={{display:"flex",alignItems:"center",gap:3}}>
      <div style={{width:8,height:8,borderRadius:2,background:CL[i%CL.length]}}/>
      <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>{f.name}</span>
    </div>
  ));

  return (
    <div>
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600}}>📊 計画表示</span>
          <select value={ff||""} onChange={e=>setFf(e.target.value||null)} style={{...inp,width:"auto",padding:"4px 8px",fontSize:12}}>
            <option value="">全分野</option>
            {state.fields.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
          </select>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <div style={{...card,textAlign:"center",marginBottom:0,padding:14}}>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:10,marginBottom:2}}>累積{sur?"余剰":"不足"}</div>
          <div style={{color:sur?"#4ade80":"#f87171",fontSize:24,fontWeight:700}}>{sur?"+":""}{cum.pageDiff}</div>
          <div style={{color:"rgba(255,255,255,0.2)",fontSize:10}}>実質ページ</div>
        </div>
        <div style={{...card,textAlign:"center",marginBottom:0,padding:14}}>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:10,marginBottom:2}}>日数換算</div>
          <div style={{color:sur?"#4ade80":"#f87171",fontSize:24,fontWeight:700}}>{sur?"+":""}{cum.daysDiff}</div>
          <div style={{color:"rgba(255,255,255,0.2)",fontSize:10}}>日分の{sur?"余剰":"遅れ"}</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <div style={{...card,textAlign:"center",marginBottom:0,padding:10}}>
          <div style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>計画累計</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:16,fontWeight:700}}>{cum.cumPlan}<span style={{fontSize:10,fontWeight:400}}> 実質p</span></div>
        </div>
        <div style={{...card,textAlign:"center",marginBottom:0,padding:10}}>
          <div style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>実績累計</div>
          <div style={{color:"#818cf8",fontSize:16,fontWeight:700}}>{cum.cumActual}<span style={{fontSize:10,fontWeight:400}}> 実質p</span></div>
        </div>
      </div>

      <div style={{...card,padding:"14px 22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{color:"rgba(255,255,255,0.45)",fontSize:11}}>表示範囲</span>
          <span style={{color:"#fbbf24",fontSize:12,fontWeight:600}}>±{fmtRange(hw)}（計{fmtRange(tw)}）</span>
        </div>
        <input type="range" min={1} max={260} step={1} value={hw} onChange={e=>setHw(parseInt(e.target.value))} style={{width:"100%",accentColor:"#fbbf24"}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{color:"rgba(255,255,255,0.15)",fontSize:9}}>±1週</span>
          <span style={{color:"rgba(255,255,255,0.15)",fontSize:9}}>±5年</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",marginTop:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          <button onClick={()=>stepOffset(-1)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.6)",borderRadius:9,padding:"8px",fontSize:14,cursor:"pointer"}}>◀ 過去</button>
          <button onClick={()=>setOffsetDays(0)} disabled={offsetDays===0} style={{flex:1,background:offsetDays===0?"rgba(255,255,255,0.03)":"rgba(251,191,36,0.14)",border:`1px solid ${offsetDays===0?"rgba(255,255,255,0.06)":"rgba(251,191,36,0.3)"}`,color:offsetDays===0?"rgba(255,255,255,0.25)":"#fbbf24",borderRadius:9,padding:"8px",fontSize:12,fontWeight:600,cursor:offsetDays===0?"default":"pointer"}}>今日に戻す</button>
          <button onClick={()=>stepOffset(1)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.6)",borderRadius:9,padding:"8px",fontSize:14,cursor:"pointer"}}>未来 ▶</button>
        </div>
        <div style={{textAlign:"center",marginTop:6,color:"rgba(255,255,255,0.25)",fontSize:10}}>
          グラフを左右にドラッグでも移動できます{offsetDays!==0?` · 中心 ${fS(addD(t,offsetDays))}`:""}
        </div>
      </div>

      <div style={{...card,padding:"14px 6px 6px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,padding:"0 16px"}}>
          <span style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600}}>計画 vs 実績（日別）</span>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:10,height:10,borderRadius:2,background:"rgba(255,255,255,0.15)"}}/>
              <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>計画</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:10,height:10,borderRadius:2,background:"#4ade80"}}/>
              <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>達成</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:10,height:10,borderRadius:2,background:"#f87171"}}/>
              <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>未達</span>
            </div>
          </div>
        </div>
        <div {...panProps}>
          <DailyCompareChart data={compareData} />
        </div>
      </div>

      <div {...panProps}>
      <StackedChart days={paData} fields={state.fields} showCapLine={true}
        title="実績 + 予定（分野別積み上げ）"
        legend={<>
          {fieldLegend}
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:10,height:10,borderRadius:2,background:"rgba(255,255,255,0.15)",border:"1px dashed rgba(255,255,255,0.3)"}}/>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>予定</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:10,height:10,borderRadius:2,background:"rgba(129,140,248,0.6)"}}/>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>実績</span>
          </div>
        </>}
      />
      </div>

      <div style={card}>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,marginBottom:8}}>分野別</div>
        {state.fields.map((f,i)=>{
          const te=fieldEff(f);const ae=logsEff(f,state.logs);
          let latestD=t;Object.keys(state.logs).forEach(d=>{const arr=state.logs[d];if(Array.isArray(arr)&&arr.some(e=>e.fid===f.id)&&d>latestD)latestD=d;});
          let pln=0,d=f.startDate;while(d<=latestD&&pln<te){pln=Math.min(pln+fieldReq(f,d,segs),te);d=addD(d,1);}
          const diff=ae-pln;const dayReq=fieldReq(f,t,segs);const daysDiff=dayReq>0?(diff/dayReq):0;
          return (
            <div key={f.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:CL[i%CL.length],flexShrink:0}}/>
              <span style={{color:"rgba(255,255,255,0.6)",fontSize:12,flex:1}}>{f.name}</span>
              <span style={{color:diff>=0?"#4ade80":"#f87171",fontSize:12,fontWeight:700,minWidth:70,textAlign:"right"}}>{diff>=0?"+":""}{diff.toFixed(0)}p ({daysDiff>=0?"+":""}{daysDiff.toFixed(1)}日)</span>
            </div>
          );
        })}
      </div>

      {/* ═══ Meditation chart section ═══ */}
      <div style={{marginTop:28,paddingTop:20,borderTop:`1px solid ${MED_COLOR}22`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"0 4px"}}>
          <span style={{fontSize:18}}>🧘</span>
          <span style={{color:MED_COLOR,fontSize:13,fontWeight:600,letterSpacing:"0.04em"}}>瞑想</span>
          <div style={{flex:1,height:1,background:`linear-gradient(90deg,${MED_COLOR}33,transparent)`}}/>
        </div>

        <div style={{...card,borderColor:`${MED_COLOR}22`,background:"linear-gradient(135deg,#0f0d18,#15131f)"}}>
          {medPh === 0 ? (
            <div style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:6}}>瞑想プログラム開始予定日</div>
              <div style={{color:MED_COLOR,fontSize:18,fontWeight:600}}>{fF(med.startDate)}</div>
              <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:6}}>開始まであと {Math.max(0,diffD(t,med.startDate))} 日</div>
            </div>
          ) : (
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{color:MED_COLOR,fontSize:11,letterSpacing:"0.15em",fontStyle:"italic",marginBottom:2}}>PHASE {medPh} · WEEK {medWk}</div>
                  <div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>
                    {medPh===1?"習慣の起点を作る":medPh===2?"時間を伸ばし姿勢を整える":medPh===3?"隨息観への移行":"オープン・モニタリング / 只管打坐"}
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:"#fff",fontSize:20,fontWeight:700}}>{perSession}<span style={{fontSize:11,fontWeight:400}}>分</span> × 1<span style={{fontSize:11,fontWeight:400,color:"rgba(255,255,255,0.4)"}}>回</span></div>
                  <div style={{color:MED_COLOR,fontSize:11,marginTop:2}}>= {dailyTarget}分/日</div>
                </div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:"rgba(255,255,255,0.35)",fontSize:11}}>主な実践</span>
                <span style={{color:MED_COLOR,fontSize:12,fontWeight:600}}>{defPractice}</span>
              </div>
            </>
          )}
        </div>

        <div style={{...card,padding:"14px 6px 6px",borderColor:`${MED_COLOR}1a`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,padding:"0 16px"}}>
            <span style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600}}>瞑想 計画 vs 実績（日別）</span>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:"rgba(255,255,255,0.15)"}}/>
                <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>計画</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:MED_COLOR}}/>
                <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>達成</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:"#f87171"}}/>
                <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>未達</span>
              </div>
            </div>
          </div>

            <DailyCompareChart data={medCompareData} successColor={MED_COLOR}/>

      </div>
    </div>
  );
}

// ═══ Meditation section (used inside DailyTab) ═══
function MeditationSection({state, persist, vd, openProc}) {
  const [slot,setSlot]=useState(MED_SLOTS[0]);
  const [practice,setPractice]=useState(null);
  const [dur,setDur]=useState("");
  const [ei,setEi]=useState(null);
  const [celebrate,setCelebrate]=useState(false);

  const med=state.meditation||{startDate:MED_START_DEFAULT,sessions:{}};
  const medSegs=useMemo(()=>getMedSegs(state),[state]);
  const t=today();
  const isToday=vd===t;
  const beforeStart=vd<med.startDate;
  const phase=medPhase(vd,medSegs);
  const week=medWeek(vd,medSegs);
  const perSession=medPerSessionPlan(vd,medSegs);
  const dailyTarget=medDailyPlan(vd,medSegs);
  const defPractice=medDefaultPractice(vd,medSegs);
  const sessions=Array.isArray(med.sessions[vd])?med.sessions[vd]:[];
  const totalActual=sessions.reduce((s,x)=>s+(x.duration||0),0);
  const pct=dailyTarget>0?Math.min(totalActual/dailyTarget*100,100):(totalActual>0?100:0);

  const missAlert=useMemo(()=>isToday?medCheckMissTwice(med):null,[med,isToday]);

  const reset=useCallback(()=>{setSlot(MED_SLOTS[0]);setPractice(null);setDur("");setEi(null);},[]);

  // 編集開始時にフォーム値を反映
  useEffect(()=>{
    if(ei!==null && sessions[ei]){
      const e=sessions[ei];

      setDur(String(e.duration||""));
    }
  // eslint-disable-next-line
  },[ei]);

  // 日付が変わったときフォームをリセット
  useEffect(()=>{reset();},[vd,reset]);

  function startEd(idx){
    setEi(idx);

    const d=parseInt(dur);if(!d||d<=0)return;
    const ns=JSON.parse(JSON.stringify(state));

    if(!ns.meditation.sessions[vd]) ns.meditation.sessions[vd]=[];
    const entry={slot,practice:practice||defPractice,duration:d};
    const isNew = ei===null;
    if(ei!==null && ei<ns.meditation.sessions[vd].length){
      ns.meditation.sessions[vd][ei]=entry;
    } else {
      ns.meditation.sessions[vd].push(entry);
    }
    persist(ns);
    reset();
    if(isNew){
      setCelebrate(true);
      setTimeout(()=>setCelebrate(false),1600);
    }
  }

  function delSession(idx){
    const ns=JSON.parse(JSON.stringify(state));
    if(!ns.meditation || !ns.meditation.sessions || !Array.isArray(ns.meditation.sessions[vd])) return;
    ns.meditation.sessions[vd].splice(idx,1);
    if(ns.meditation.sessions[vd].length===0) delete ns.meditation.sessions[vd];
    persist(ns);
    reset();
  }

  function quickMin(){
    const ns=JSON.parse(JSON.stringify(state));
    if(!ns.meditation) ns.meditation={startDate:MED_START_DEFAULT,sessions:{}};
    if(!ns.meditation.sessions) ns.meditation.sessions={};
    if(!ns.meditation.sessions[vd]) ns.meditation.sessions[vd]=[];
    ns.meditation.sessions[vd].push({slot,practice:practice||defPractice,duration:1,minimum:true});
    persist(ns);
    reset();
    setCelebrate(true);
    setTimeout(()=>setCelebrate(false),1600);
  }

  const slotColor={"朝":"#fbbf24","夜":"#818cf8","その他":"#9ca3af"};

  return (
    <div style={{marginTop:28,paddingTop:20,borderTop:`1px solid ${MED_COLOR}22`,position:"relative"}}>

        <div style={{

          background:`${MED_COLOR}cc`,color:"#1a0f2e",padding:"12px 28px",borderRadius:14,
          fontSize:18,fontWeight:700,letterSpacing:"0.1em",fontFamily:"'Shippori Mincho','Yu Mincho',serif",
          boxShadow:`0 8px 32px ${MED_COLOR}66`,
          animation:"medFade 1.6s ease-out forwards"
        }}>よし</div>
      )}
      <style>{`@keyframes medFade{0%{opacity:0;transform:translate(-50%,8px) scale(0.92)}15%{opacity:1;transform:translate(-50%,0) scale(1)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-4px) scale(1)}}`}</style>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,padding:"0 4px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>🧘</span>
          <span style={{color:MED_COLOR,fontSize:13,fontWeight:600,letterSpacing:"0.04em"}}>瞑想</span>
        </div>
        <button onClick={openProc} style={{background:`${MED_COLOR}1a`,color:MED_COLOR,border:`1px solid ${MED_COLOR}33`,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>📖 手順を表示</button>
      </div>

      <div style={{...card,borderColor:`${MED_COLOR}22`,background:"linear-gradient(135deg,#0f0d18,#15131f)"}}>
        {beforeStart ? (

            <div style={{color:MED_COLOR,fontSize:16,fontWeight:600}}>{fF(med.startDate)}</div>

        ) : (

      {missAlert && (

      {!beforeStart && (

            <span style={{color:totalActual>=dailyTarget?MED_COLOR:"#fff",fontSize:18,fontWeight:700}}>
              {totalActual}<span style={{fontSize:11,fontWeight:400,color:"rgba(255,255,255,0.4)"}}>/{dailyTarget}</span>
              <span style={{fontSize:11,fontWeight:400,color:"rgba(255,255,255,0.4)"}}> 分</span>
            </span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:6,height:8,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:pct>=100?MED_COLOR:`linear-gradient(90deg,${MED_COLOR}aa,${MED_COLOR})`,borderRadius:6}}/>
            </div>
            <span style={{color:pct>=100?MED_COLOR:"#fff",fontSize:13,fontWeight:700}}>{pct.toFixed(0)}%</span>
          </div>
          <div style={{color:"rgba(255,255,255,0.25)",fontSize:11,marginTop:6,textAlign:"right"}}>

      <div style={{...card,borderColor:`${MED_COLOR}1a`}}>
        <div style={{color:MED_COLOR,fontSize:12,fontWeight:600,marginBottom:10}}>

        </div>

        <label style={lb}>スロット</label>

          {MED_SLOTS.map(s=>(
            <button key={s} onClick={()=>setSlot(s)} style={{
              flex:1,
              background:slot===s?`${slotColor[s]}22`:"rgba(255,255,255,0.04)",

// ═══ Tab 3: Daily Record (study + meditation) ═══
function DailyTab({state,persist}) {
  const [vd,setVd]=useState(today());
  const [sf,setSf]=useState(null);const [sb,setSb]=useState(null);const [pg,setPg]=useState("");const [ei,setEi]=useState(null);
  const [showProc,setShowProc]=useState(false);
  const segs=useMemo(()=>getSegs(state),[state]);
  const reset=()=>{setSb(null);setPg("");setEi(null);};
  const go=(d)=>{setVd(d);reset();};
  const dReq=dailyReq(vd,segs);
  const vdAlloc=useMemo(()=>getAllocOnDate(state.fields, vd, segs),[state.fields,segs,vd]);
  const dl=Array.isArray(state.logs[vd])?state.logs[vd]:[];
  const fs=state.fields.map(f=>{
    const done=fieldComplete(f);
    const req=done?0:fieldReq(f,vd,segs);
    let act=0;
    dl.forEach(e=>{if(e.fid!==f.id)return;const b=f.books.find(x=>x.id===e.bid);if(b)act+=e.pg*(b.coeff||1);});
    return {f,req,act,done};
  });
  // 「分野別」は今日(表示日)に読む目標がある分野(req>0)だけ表示
  const targetFs=fs.filter(x=>x.req>0);
  const tReq=fs.reduce((s,x)=>s+x.req,0);const tAct=fs.reduce((s,x)=>s+x.act,0);
  const pct=tReq>0?Math.min(tAct/tReq*100,100):0;

  function saveLog(){
    const p=parseInt(pg);if(!sf||!sb||!p||p<=0)return;
    const ns=JSON.parse(JSON.stringify(state));
    if(!ns.logs[vd])ns.logs[vd]=[];
    if(ei!==null&&ei<ns.logs[vd].length){
      const old=ns.logs[vd][ei];
      ns.fields=ns.fields.map(f=>f.id!==old.fid?f:{...f,books:f.books.map(b=>b.id!==old.bid?b:{...b,pagesRead:Math.max(0,b.pagesRead-old.pg)})});
      ns.logs[vd][ei]={fid:sf,bid:sb,pg:p};
    }else{ns.logs[vd].push({fid:sf,bid:sb,pg:p});}
    ns.fields=ns.fields.map(f=>f.id!==sf?f:{...f,books:f.books.map(b=>b.id!==sb?b:{...b,pagesRead:Math.min(b.pagesRead+p,b.totalPages)})});
    persist(ns);reset();
  }
  function delLog(idx){
    const ns=JSON.parse(JSON.stringify(state));const arr=ns.logs[vd];if(!arr||idx>=arr.length)return;
    const entry=arr[idx];
    ns.fields=ns.fields.map(f=>f.id!==entry.fid?f:{...f,books:f.books.map(b=>b.id!==entry.bid?b:{...b,pagesRead:Math.max(0,b.pagesRead-entry.pg)})});
    arr.splice(idx,1);if(arr.length===0)delete ns.logs[vd];
    persist(ns);reset();
  }
  function startEd(idx){const e=dl[idx];if(!e)return;setSf(e.fid);setSb(e.bid);setPg(String(e.pg));setEi(idx);}
  const selF=state.fields.find(f=>f.id===sf);const selB=selF?.books.find(b=>b.id===sb);

  return (
    <div>
      <div style={{...card,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <button onClick={()=>go(addD(vd,-1))} style={{background:"rgba(255,255,255,0.08)",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontSize:16,flexShrink:0}}>◀</button>
        <div style={{textAlign:"center",flex:1}}>
          <div style={{color:"#fff",fontSize:16,fontWeight:700}}>{fF(vd)} ({dw(vd)})</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center",marginTop:4}}>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:11}}>{isWe(vd)?"🟣 休日":"🟢 平日"} · {diffD(GS,vd)+1}日目</span>
            {vd!==today()&&<button onClick={()=>go(today())} style={{background:"rgba(251,191,36,0.15)",color:"#fbbf24",border:"none",borderRadius:6,padding:"2px 8px",fontSize:10,cursor:"pointer"}}>今日へ</button>}
          </div>
        </div>
        <button onClick={()=>go(addD(vd,1))} style={{background:"rgba(255,255,255,0.08)",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontSize:16,flexShrink:0}}>▶</button>
      </div>

      {/* ── Study section ── */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>📚 勉強ノルマ</span>
          <span style={{color:"#fbbf24",fontSize:22,fontWeight:700}}>{dReq.toFixed(1)}<span style={{fontSize:12,fontWeight:400}}> 実質p</span></span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:6,height:8,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",background:pct>=100?"#4ade80":"linear-gradient(90deg,#818cf8,#c084fc)",borderRadius:6}}/>
          </div>
          <span style={{color:pct>=100?"#4ade80":"#fff",fontSize:14,fontWeight:700}}>{pct.toFixed(0)}%</span>
        </div>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:11,marginTop:4,textAlign:"right"}}>{tAct.toFixed(1)} / {tReq.toFixed(1)} 実質p</div>
      </div>

      {vdAlloc>100 && (
        <div style={{...card,borderColor:"rgba(248,113,113,0.35)",background:"linear-gradient(135deg,#1f1419,#1a1f2e)"}}>
          <div style={{color:"#f87171",fontSize:13,fontWeight:600,marginBottom:4}}>⚠️ 割当が100%を超えています</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,lineHeight:1.7}}>
            {fF(vd)}の分野割当合計は <span style={{color:"#f87171",fontWeight:600}}>{vdAlloc}%</span> です。「計画入力」で各分野の割合を見直してください。
          </div>
        </div>
      )}

      <div style={{...card,padding:"14px 18px"}}>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,marginBottom:8}}>分野別（今日読む目標のある分野）</div>
        {targetFs.length===0 && (
          <div style={{padding:"6px 0",color:"rgba(255,255,255,0.25)",fontSize:12}}>この日に読む目標のある分野はありません。</div>
        )}
        {targetFs.map((x)=>{
          const i=state.fields.findIndex(ff=>ff.id===x.f.id);
          const p=x.req>0?Math.min(x.act/x.req*100,100):0;
          const cb=x.f.books.find(b=>!b.disabled&&b.pagesRead<b.totalPages);

                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:CL[i%CL.length]}}/>
                  <span style={{color:"rgba(255,255,255,0.8)",fontSize:13,fontWeight:600}}>{x.f.name}</span>

                <span style={{color:p>=100?"#4ade80":"rgba(255,255,255,0.5)",fontSize:12,fontWeight:700}}>
                  {x.act.toFixed(1)}/{x.req.toFixed(1)} {p>=100?"✓":`(${p.toFixed(0)}%)`}

              <div style={{display:"flex",alignItems:"center",gap:8}}>
