            </div>
          );
        })}
      </div>

      <div style={card}>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600,marginBottom:10}}>{ei!==null?"📝 編集":"✏️ 勉強記録"}</div>
        <label style={lb}>分野</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {state.fields.map((f,i)=>(
            <button key={f.id} onClick={()=>{setSf(f.id);setSb(null);setPg("");setEi(null);}} style={{
              background:sf===f.id?CL[i%CL.length]+"33":"rgba(255,255,255,0.04)",
              color:sf===f.id?CL[i%CL.length]:"rgba(255,255,255,0.5)",
              border:`1px solid ${sf===f.id?CL[i%CL.length]+"55":"rgba(255,255,255,0.08)"}`,
              borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",
            }}>{f.name}</button>
          ))}
        </div>
        {selF&&(<>
          <label style={lb}>本</label>
          <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
            {selF.books.filter(b=>!b.disabled).map(b=>(
              <button key={b.id} onClick={()=>{setSb(b.id);setPg("");}} style={{
                background:sb===b.id?"rgba(251,191,36,0.1)":"rgba(255,255,255,0.03)",
                border:sb===b.id?"1px solid rgba(251,191,36,0.3)":"1px solid rgba(255,255,255,0.06)",
                borderRadius:8,padding:"8px 12px",textAlign:"left",cursor:"pointer",color:"#fff",
              }}>
                <div style={{fontSize:12,fontWeight:sb===b.id?600:400}}>{b.title}</div>
                <div style={{color:"rgba(255,255,255,0.25)",fontSize:10}}>{b.pagesRead}/{b.totalPages}p · 係数{b.coeff}</div>
              </button>
            ))}
          </div>
        </>)}
        {selB&&(<>
          <label style={lb}>読んだ実ページ数</label>
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <input type="number" value={pg} onChange={e=>setPg(e.target.value)} placeholder="例: 20"
              style={{...inp,fontSize:18,fontWeight:700,padding:"10px 14px",flex:1}} onKeyDown={e=>{if(e.key==="Enter")saveLog();}}/>
            {pg&&parseInt(pg)>0&&<div style={{color:"#fbbf24",fontSize:12,fontWeight:600,marginBottom:10,whiteSpace:"nowrap"}}>={(parseInt(pg)*(selB.coeff||1)).toFixed(1)}実質p</div>}
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            {ei!==null&&<button onClick={reset} style={{flex:1,background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13}}>キャンセル</button>}
            <button onClick={saveLog} style={{flex:1,background:"#fbbf24",color:"#000",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:14,fontWeight:700}}>{ei!==null?"更新":"記録する"}</button>
          </div>
        </>)}
      </div>

      {dl.length>0&&(
        <div style={card}>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,marginBottom:8}}>📝 {fS(vd)} の勉強記録</div>
          {dl.map((e,i)=>{
            const f=state.fields.find(x=>x.id===e.fid);const b=f?.books.find(x=>x.id===e.bid);
            const fi=f?state.fields.indexOf(f):0;const eff=e.pg*(b?.coeff||1);
            return (
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <div style={{flex:1,minWidth:0}}>
                  <span style={{color:CL[fi%CL.length],fontSize:11}}>{f?.name}</span>
                  <span style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginLeft:6}}>{b?.title}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                  <span style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{e.pg}p</span>
                  <span style={{color:"rgba(255,255,255,0.25)",fontSize:10}}>({eff.toFixed(1)})</span>
                  <button onClick={()=>startEd(i)} style={{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.4)",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>編集</button>
                  <button onClick={()=>delLog(i)} style={{background:"rgba(248,113,113,0.08)",color:"#f87171",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>削除</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Meditation section ── */}
      <MeditationSection state={state} persist={persist} vd={vd} openProc={()=>setShowProc(true)}/>

      {showProc && <MedProcedureModal onClose={()=>setShowProc(false)}/>}
    </div>
  );
}

// ═══ Main App ═══
function App() {
  const [st,setSt]=useState(DEF);const [ld,setLd]=useState(true);const [tab,setTab]=useState("daily");
  const [importText,setImportText]=useState("");
  const [syncMsg,setSyncMsg]=useState("");
  const [dataEmpty,setDataEmpty]=useState(false);
  const [showCopyDone,setShowCopyDone]=useState(false);
  const [showAdvSync,setShowAdvSync]=useState(false);
  const [cloudStatus,setCloudStatus]=useState("");

  useEffect(()=>{
    (async()=>{
      const d=await load();
      if(d&&d.fields&&d.fields.length>0){setSt(migrateMed(d));setDataEmpty(false);}
      else if(d&&migrateMed(d).meditation&&Object.keys(migrateMed(d).meditation.sessions||{}).length>0){
        // 勉強分野はないが瞑想記録はある場合
        setSt(migrateMed(d));setDataEmpty(false);
      }
      else{setDataEmpty(true);}
      setLd(false);
    })();
  },[]);

  const ps=useCallback(ns=>{
    const migrated=migrateMed(ns);
    setSt(migrated);save(migrated);
    setDataEmpty(!migrated.fields||migrated.fields.length===0);
    // 瞑想記録があればdataEmpty=falseに
    if(migrated.meditation && migrated.meditation.sessions && Object.keys(migrated.meditation.sessions).length>0){
      setDataEmpty(false);
    }
    setCloudStatus("syncing");
    saveCloud(migrated).then(ok=>{setCloudStatus(ok?"ok":"error");setTimeout(()=>setCloudStatus(""),3000);});
  },[]);

  async function pullCloud2(){
    setCloudStatus("syncing");setSyncMsg("");
    const d=await loadCloud();
    if(d&&d.fields!==undefined){const m=migrateMed(d);setSt(m);saveLocal(m);setCloudStatus("ok");setSyncMsg("✅ クラウドから取得しました");setDataEmpty(false);}
    else{setCloudStatus("error");setSyncMsg("❌ 取得失敗。接続を確認してください。");}
    setTimeout(()=>{setCloudStatus("");setSyncMsg("");},4000);
  }
  async function pushCloud2(){
    setCloudStatus("syncing");setSyncMsg("");
    const ok=await saveCloud(st);
    setCloudStatus(ok?"ok":"error");
    setSyncMsg(ok?"✅ クラウドに保存しました":"❌ 保存に失敗しました");
    setTimeout(()=>{setCloudStatus("");setSyncMsg("");},4000);
  }

  function copyData(){
    const json=JSON.stringify(st);let copied=false;
    try{const ta=document.createElement("textarea");ta.value=json;ta.style.cssText="position:fixed;left:-9999px;top:-9999px;opacity:0;";document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,json.length);copied=document.execCommand("copy");document.body.removeChild(ta);}catch{}
    if(!copied){try{navigator.clipboard.writeText(json).then(()=>{setShowCopyDone(true);setTimeout(()=>setShowCopyDone(false),2500);}).catch(()=>{setImportText(json);setShowAdvSync(true);setSyncMsg("📋 テキストを全選択→コピーしてください。");});return;}catch{}}
    if(copied){setShowCopyDone(true);setTimeout(()=>setShowCopyDone(false),2500);}
    else{setImportText(json);setShowAdvSync(true);setSyncMsg("📋 テキストを全選択→コピーしてください。");}
  }

  function doRestore(){
    try{const data=JSON.parse(importText);if(!data.fields)throw new Error("invalid");if(!data.logs)data.logs={};ps(migrateMed(data));setSyncMsg("✅ データを復元しました！");setImportText("");setDataEmpty(false);setTimeout(()=>setSyncMsg(""),3000);}
    catch{setSyncMsg("❌ データ形式が正しくありません。");}
  }

  if(ld) return <div style={{minHeight:"100vh",background:"#0a0e14",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"rgba(255,255,255,0.4)"}}>読み込み中...</div></div>;

  if(dataEmpty && st.fields.length===0){
    return (
      <div style={{minHeight:"100vh",background:"#0a0e14",fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif"}}>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
        <div style={{maxWidth:540,margin:"0 auto",padding:"40px 16px"}}>
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{fontSize:48,marginBottom:12}}>📚</div>
            <h1 style={{color:"#fff",fontSize:22,fontWeight:700,margin:"0 0 8px"}}>勉強+瞑想 計画トラッカー</h1>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:13,lineHeight:1.7}}>データが見つかりません。</p>
          </div>
          <div style={{...card,borderColor:"rgba(74,222,128,0.2)"}}>
            <div style={{color:"#4ade80",fontSize:14,fontWeight:600,marginBottom:10}}>☁️ Google Docsから復元</div>
            <button onClick={async()=>{setSyncMsg("⏳ 取得中...");const d=await loadCloud();if(d&&d.fields&&d.fields.length>0){const m=migrateMed(d);setSt(m);saveLocal(m);setDataEmpty(false);setSyncMsg("✅ 復元しました！");}else{setSyncMsg("❌ データが見つかりませんでした。");}}} style={{width:"100%",background:"#4ade80",color:"#000",border:"none",borderRadius:10,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer"}}>☁️ クラウドから復元</button>
          </div>
          <div style={{...card,borderColor:"rgba(129,140,248,0.2)"}}>
            <div style={{color:"#818cf8",fontSize:14,fontWeight:600,marginBottom:10}}>📥 手動で復元</div>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="コピーしたデータを貼り付け..." rows={4} style={{...inp,fontSize:12,fontFamily:"monospace",resize:"vertical",marginBottom:10}} />
            <button onClick={doRestore} style={{width:"100%",background:importText?"#818cf8":"rgba(255,255,255,0.03)",color:importText?"#fff":"rgba(255,255,255,0.2)",border:"none",borderRadius:10,padding:"14px",fontSize:14,fontWeight:700,cursor:importText?"pointer":"default"}}>復元する</button>
            {syncMsg&&<div style={{color:syncMsg.startsWith("✅")?"#4ade80":"#f87171",fontSize:12,marginTop:10}}>{syncMsg}</div>}
          </div>
          <div style={{textAlign:"center",marginTop:20}}>
            <button onClick={()=>setDataEmpty(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>復元せずに新規で始める</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"#0a0e14",fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
      <div style={{maxWidth:540,margin:"0 auto",padding:"16px 16px 120px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h1 style={{color:"#fff",fontSize:17,fontWeight:700,margin:0}}>📚 勉強+瞑想 トラッカー</h1>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:9,color:cloudStatus==="ok"?"#4ade80":cloudStatus==="syncing"?"#fbbf24":cloudStatus==="error"?"#f87171":"rgba(255,255,255,0.2)"}}>
              {cloudStatus==="syncing"?"⏳":cloudStatus==="ok"?"☁️✓":cloudStatus==="error"?"☁️✗":"☁️"}
            </span>
            <button onClick={()=>setShowAdvSync(!showAdvSync)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"4px 10px",color:"rgba(255,255,255,0.5)",fontSize:10,cursor:"pointer"}}>🔄 同期</button>
            <button onClick={()=>{if(window.confirm("全データをリセット？"))ps(DEF);}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.12)",fontSize:10,cursor:"pointer"}}>リセット</button>
          </div>
        </div>

        {showAdvSync && (
          <div style={{...card,borderColor:"rgba(129,140,248,0.2)"}}>
            <div style={{color:"#4ade80",fontSize:13,fontWeight:600,marginBottom:8}}>☁️ Google Docs 同期</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <button onClick={pushCloud2} disabled={cloudStatus==="syncing"} style={{flex:1,background:"rgba(74,222,128,0.08)",color:"#4ade80",border:"1px solid rgba(74,222,128,0.15)",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {cloudStatus==="syncing"?"⏳...":"☁️↑ 保存"}
              </button>
              <button onClick={pullCloud2} disabled={cloudStatus==="syncing"} style={{flex:1,background:"rgba(129,140,248,0.08)",color:"#818cf8",border:"1px solid rgba(129,140,248,0.15)",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {cloudStatus==="syncing"?"⏳...":"☁️↓ 取得"}
              </button>
            </div>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",margin:"10px 0"}}/>
            <div style={{color:"#818cf8",fontSize:12,fontWeight:600,marginBottom:6}}>📋 手動コピー＆復元</div>
            <button onClick={copyData} style={{width:"100%",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px",fontSize:11,fontWeight:600,cursor:"pointer",marginBottom:8}}>📋 データをコピー</button>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="データを貼り付けて復元..." rows={2} style={{...inp,fontSize:11,fontFamily:"monospace",resize:"vertical",marginBottom:8}} />
            <button onClick={doRestore} disabled={!importText} style={{width:"100%",background:importText?"rgba(129,140,248,0.15)":"rgba(255,255,255,0.03)",color:importText?"#818cf8":"rgba(255,255,255,0.2)",border:"1px solid "+(importText?"rgba(129,140,248,0.2)":"rgba(255,255,255,0.05)"),borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:importText?"pointer":"default"}}>📥 復元する</button>
            {syncMsg&&<div style={{color:syncMsg.startsWith("✅")?"#4ade80":syncMsg.startsWith("❌")?"#f87171":"#fbbf24",fontSize:12,marginTop:8}}>{syncMsg}</div>}
          </div>
        )}

        <div style={{display:"flex",gap:4,marginBottom:20,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:3}}>
          {[{id:"plan",l:"計画入力",ic:"📋"},{id:"chart",l:"計画表示",ic:"📊"},{id:"daily",l:"今日の記録",ic:"✏️"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,background:tab===t.id?"rgba(255,255,255,0.08)":"transparent",
              border:"none",borderRadius:9,padding:"10px 4px",
              color:tab===t.id?"#fff":"rgba(255,255,255,0.35)",
              fontSize:11,fontWeight:tab===t.id?600:400,cursor:"pointer",lineHeight:1.4,
            }}>{t.ic}<br/>{t.l}</button>
          ))}
        </div>

        {tab==="plan"&&<PlanTab state={st} persist={ps}/>}
        {tab==="chart"&&<ChartTab state={st}/>}
        {tab==="daily"&&<DailyTab state={st} persist={ps}/>}
      </div>

      {(st.fields.length>0 || (st.meditation && Object.keys(st.meditation.sessions||{}).length>0)) && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(0deg,#0a0e14 60%,transparent)",padding:"16px 16px 12px"}}>
          <div style={{maxWidth:540,margin:"0 auto",display:"flex",gap:8}}>
            <button onClick={pushCloud2} disabled={cloudStatus==="syncing"} style={{
              flex:2,
              background:cloudStatus==="ok"?"rgba(74,222,128,0.12)":cloudStatus==="error"?"rgba(248,113,113,0.12)":"rgba(255,255,255,0.06)",
              border:"1px solid "+(cloudStatus==="ok"?"rgba(74,222,128,0.3)":cloudStatus==="error"?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.1)"),
              borderRadius:10,padding:"10px 12px",
              color:cloudStatus==="ok"?"#4ade80":cloudStatus==="error"?"#f87171":cloudStatus==="syncing"?"#fbbf24":"rgba(255,255,255,0.5)",
              fontSize:11,fontWeight:600,cursor:cloudStatus==="syncing"?"wait":"pointer",
            }}>
              {cloudStatus==="syncing"?"⏳ 同期中...":cloudStatus==="ok"?"☁️✓ 保存済":"☁️ クラウドに保存"}
            </button>
            <button onClick={pullCloud2} disabled={cloudStatus==="syncing"} style={{
              flex:1,
              background:"rgba(129,140,248,0.06)",border:"1px solid rgba(129,140,248,0.15)",
              borderRadius:10,padding:"10px 12px",
              color:cloudStatus==="syncing"?"rgba(129,140,248,0.4)":"#818cf8",
              fontSize:11,fontWeight:600,cursor:cloudStatus==="syncing"?"wait":"pointer",
            }}>☁️↓ 取得</button>
            <button onClick={copyData} style={{
              background:showCopyDone?"rgba(74,222,128,0.15)":"rgba(255,255,255,0.04)",
              border:"1px solid "+(showCopyDone?"rgba(74,222,128,0.3)":"rgba(255,255,255,0.06)"),
              borderRadius:10,padding:"10px 12px",
              color:showCopyDone?"#4ade80":"rgba(255,255,255,0.35)",
              fontSize:11,fontWeight:600,cursor:"pointer",
            }}>{showCopyDone?"✅":"📋"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
